const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function render(lang){

  const cards = t.impact.cards.map(c=>`
    <article class="card reveal">

      <div class="row"><b>${labels.problem}</b><span>${esc(c.problem)}</span></div>
      <div class="row"><b>${labels.action}</b><span>${esc(c.action)}</span></div>
      <div class="row result"><b>${labels.result}</b><span>${esc(c.result)}</span></div>
    </article>`).join('');

  const jobs = t.exp.jobs.map(j=>`
    <div class="job reveal">
      <div class="job-row">
        ${LOGOS[j.co]?`<img class="job-logo" src="${LOGOS[j.co]}" alt="" width="22" height="22" loading="lazy" />`:''}
        <h3>${esc(j.role)} · <span class="co">${esc(j.co)}</span></h3>
        <span class="when">${esc(j.when)}</span>
        ${j.loc?`<span class="loc">· ${esc(j.loc)}</span>`:''}
      </div>
      ${j.bullets.length?`<ul>${j.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>`:''}

  const chips = (arr,solid)=>arr.map(x=>`<span class="chip${solid?' solid':''}">${esc(x)}</span>`).join('');

function setLang(lang){
  document.documentElement.lang = lang==='pt' ? 'pt-BR' : 'en';
  document.getElementById('bt-pt').setAttribute('aria-pressed', lang==='pt');
  document.getElementById('bt-en').setAttribute('aria-pressed', lang==='en');
  try{ localStorage.setItem('lang', lang); }catch(e){}
  render(lang);
}

let io;
function observe(){
  const els = document.querySelectorAll('.reveal:not(.in)');
  if(!('IntersectionObserver' in window) || matchMedia('(prefers-reduced-motion:reduce)').matches){
    els.forEach(e=>e.classList.add('in')); return;
  }
  io = io || new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{rootMargin:'0px 0px -8% 0px'});
  els.forEach(e=>io.observe(e));
}

let saved = 'pt';
try{ saved = localStorage.getItem('lang') || 'pt'; }catch(e){}
setLang(saved);
window.addEventListener('DOMContentLoaded', ()=>{ if(window.lucide) lucide.createIcons(); });
