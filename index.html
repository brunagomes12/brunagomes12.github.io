<style>
  :root{
    --ivory:#FBF7F4; --blush:#F4DCE0; --rose:#E8C4C4;
    --berry:#9B2D5E; --berry-dk:#7A2049; --coral:#E5736A;
    --ink:#2A2228; --ink-soft:#6B5F66; --line:#E9DEDF;
    --grad:linear-gradient(135deg,var(--berry),var(--coral));
    --maxw:1080px; --r:18px;
    --shadow:0 1px 2px rgba(42,34,40,.04), 0 8px 30px rgba(155,45,94,.07);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--ivory); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif; line-height:1.65;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(40rem 30rem at 85% -5%, rgba(229,115,106,.10), transparent 60%),
      radial-gradient(36rem 28rem at -5% 12%, rgba(155,45,94,.08), transparent 60%);
    background-repeat:no-repeat;
  }
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 clamp(20px,5vw,40px)}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif; line-height:1.1; font-weight:600; margin:0}
  a{color:var(--berry); text-decoration:none}
  a:hover{text-decoration:underline}
  .eyebrow{font-size:.78rem; letter-spacing:.16em; text-transform:uppercase; color:var(--berry); font-weight:600;
    display:inline-flex; align-items:center; gap:7px}
  .eyebrow svg{width:16px; height:16px}
  .btn svg{width:18px; height:18px}

  /* lang toggle */
  .lang{position:fixed; top:16px; right:16px; z-index:50; display:flex; gap:2px;
    background:#fff; border:1px solid var(--line); border-radius:999px; padding:4px; box-shadow:var(--shadow)}
  .lang button{border:0; background:transparent; font:inherit; font-weight:600; font-size:.82rem;
    color:var(--ink-soft); padding:5px 12px; border-radius:999px; cursor:pointer}
  .lang button[aria-pressed="true"]{background:var(--grad); color:#fff}

  /* hero */
  header.hero{padding:clamp(80px,12vw,140px) 0 clamp(40px,6vw,70px)}
  .hero-grid{display:grid; grid-template-columns:1.25fr .9fr; gap:clamp(30px,6vw,72px); align-items:center}
  .monogram{width:60px; height:60px; border-radius:50%; display:grid; place-items:center;
    background:var(--grad); color:#fff; font-family:"Fraunces"; font-weight:600; font-size:1.4rem;
    box-shadow:var(--shadow); margin-bottom:24px}
  /* portrait */
  .hero-portrait{position:relative; justify-self:center; width:min(100%,360px); aspect-ratio:1}
  .hero-portrait img{position:relative; z-index:1; width:100%; height:100%; object-fit:cover;
    border-radius:30% 70% 70% 30% / 30% 30% 70% 70%;
    border:6px solid #fff; box-shadow:0 22px 55px rgba(155,45,94,.20)}
  .hero-portrait .blob{position:absolute; inset:-9%; z-index:0; background:var(--grad); opacity:.85;
    border-radius:38% 62% 63% 37% / 41% 44% 56% 59%; animation:morph 9s ease-in-out infinite}
  @keyframes morph{0%,100%{border-radius:38% 62% 63% 37%/41% 44% 56% 59%}
    50%{border-radius:60% 40% 41% 59%/55% 48% 52% 45%}}
  .portrait-badge{position:absolute; z-index:2; bottom:4%; left:50%; transform:translateX(-50%);
    background:#fff; box-shadow:var(--shadow); border-radius:999px; padding:8px 16px; font-size:.84rem;
    font-weight:600; display:inline-flex; gap:6px; align-items:center; white-space:nowrap}
  .portrait-badge svg{width:15px; height:15px; color:var(--berry)}
  .hero h1{font-size:clamp(2.6rem,8vw,5rem); letter-spacing:-.02em}
  .hero .role{font-size:clamp(1.05rem,2.6vw,1.35rem); font-weight:600; margin:14px 0 0; color:var(--berry)}
  .hero .tagline{font-size:clamp(1rem,2.2vw,1.18rem); color:var(--ink-soft); max-width:46ch; margin:16px 0 0}
  .cta{display:flex; flex-wrap:wrap; gap:12px; margin-top:30px}
  .btn{display:inline-flex; align-items:center; gap:8px; font-weight:600; font-size:.95rem;
    padding:12px 22px; border-radius:999px; border:1px solid transparent; cursor:pointer}
  .btn-primary{background:var(--grad); color:#fff}
  .btn-primary:hover{text-decoration:none; filter:brightness(1.06)}
  .btn-ghost{background:#fff; border-color:var(--line); color:var(--ink)}
  .btn-ghost:hover{text-decoration:none; border-color:var(--berry); color:var(--berry)}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:clamp(40px,6vw,64px)}
  .stat{background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:22px 24px; box-shadow:var(--shadow)}

    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1}

  /* sections */
  section{padding:clamp(48px,8vw,84px) 0; border-top:1px solid var(--line)}

  .about p{font-size:clamp(1.05rem,2.3vw,1.25rem); max-width:62ch; color:var(--ink)}

  /* impact cards */
  .cards{display:grid; grid-template-columns:repeat(2,1fr); gap:20px}
  .card{background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:26px; box-shadow:var(--shadow);
    transition:transform .25s ease, box-shadow .25s ease}
  .card:hover{transform:translateY(-4px); box-shadow:0 14px 40px rgba(155,45,94,.13)}
  .card .tag{display:inline-block; font-size:.72rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:var(--berry); background:var(--blush); padding:5px 11px; border-radius:999px}

  .card .row b{color:var(--berry); font-family:"Inter"; font-weight:700; flex:0 0 auto; min-width:74px}
  .card .row span{color:var(--ink-soft)}
  .card .result b{color:var(--berry-dk)}
  .card .result span{color:var(--ink); font-weight:500}

  /* timeline */
  .tl{position:relative; padding-left:30px}
  .tl::before{content:""; position:absolute; left:7px; top:6px; bottom:6px; width:2px; background:var(--line)}
  .job{position:relative; padding-bottom:34px}
  .job:last-child{padding-bottom:0}
  .job::before{content:""; position:absolute; left:-30px; top:6px; width:16px; height:16px; border-radius:50%;
    background:#fff; border:3px solid var(--berry)}
  .job .meta{display:flex; flex-wrap:wrap; gap:6px 14px; align-items:baseline}
  .job h3{font-size:1.18rem}
  .job .co{font-weight:700; color:var(--berry)}
  .job .when{font-size:.85rem; color:var(--ink-soft)}
  .job .loc{font-size:.85rem; color:var(--ink-soft)}
  .job ul{margin:10px 0 0; padding-left:18px; color:var(--ink-soft); font-size:.97rem}
  .job ul li{margin:5px 0}

  /* chips / education */
  .twocol{display:grid; grid-template-columns:1fr 1fr; gap:40px}
  .chips{display:flex; flex-wrap:wrap; gap:10px; margin-top:14px}
  .chip{background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:.9rem; font-weight:500}
  .chip.solid{background:var(--blush); border-color:transparent; color:var(--berry-dk)}
  .block h3{font-size:1.15rem; margin-bottom:6px}
  .edu .item{margin-top:14px}
  .edu .item .d{font-weight:600}
  .edu .item .s{color:var(--ink-soft); font-size:.92rem}

  /* contact */
  .contact-box{background:var(--grad); color:#fff; border-radius:24px; padding:clamp(34px,6vw,56px); text-align:center}
  .contact-box h2{color:#fff; font-size:clamp(1.8rem,5vw,2.6rem)}
  .contact-box p{color:rgba(255,255,255,.9); max-width:48ch; margin:14px auto 0}
  .contact-box .cta{justify-content:center}
  .contact-box .btn-primary{background:#fff; color:var(--berry)}
  .contact-box .btn-ghost{background:transparent; border-color:rgba(255,255,255,.5); color:#fff}
  .contact-box .btn-ghost:hover{border-color:#fff; color:#fff}

  footer{text-align:center; padding:40px 0 56px; color:var(--ink-soft); font-size:.88rem}

  /* reveal animation */
  .reveal{opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease}
  .reveal.in{opacity:1; transform:none}

  /* contact avatar */
  .contact-ava{width:88px; height:88px; border-radius:50%; object-fit:cover;
    border:4px solid rgba(255,255,255,.65); box-shadow:0 10px 30px rgba(0,0,0,.12); margin-bottom:6px}

  @media (max-width:860px){
    .hero-grid{grid-template-columns:1fr; gap:34px}
    .hero-portrait{order:-1; width:min(70%,300px)}
  }
  @media (max-width:760px){
    .stats{grid-template-columns:1fr}
    .cards{grid-template-columns:1fr}
    .twocol{grid-template-columns:1fr; gap:30px}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .reveal{opacity:1; transform:none; transition:none}
    .card{transition:none}
    .hero-portrait .blob{animation:none}
  }
  @media print{
    body{background:#fff}
    .lang{display:none}
    .reveal{opacity:1!important; transform:none!important}
    .card,.stat,.contact-box{box-shadow:none; break-inside:avoid}
    section{break-inside:avoid}
  }
</style>

    skills:{eyebrow:"Capabilities",title:"Skills & Certifications",
      compTitle:"Core competencies",
      comp:["Digital transformation","Stakeholder management","Zero to One","Checkout & Payments","Growth & Experimentation","Legacy modernization","App-First","Discovery","Product metrics","Agile / Scrum","PIX"],
      certTitle:"Certifications & Education",
      certs:["Scrum Fundamentals","Advanced Scrum Techniques","Agile User Stories","Agile Retrospectives","Product Metrics"],
      edu:[
        {d:"PM3 Courses — Product Manager",s:"Jan 2022 – Mar 2022"},
        {d:"UFLA — BSc in Information Systems",s:"2014 – 2020"},
      ]},
    contact:{title:"Let's talk?",
      body:"Open to product challenges in transactional journeys, payments and legacy modernization.",
      mail:"Send an email ✦"},
  }
};

const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function render(lang){
  const t = I18N[lang];
  // simple fields
  document.querySelectorAll('[data-k]').forEach(el=>{ el.textContent = t[el.dataset.k]; });
  // stats
  document.getElementById('stats').innerHTML = t.stats.map(s=>
    `<div class="stat reveal"><div class="num">${esc(s.num)}</div><div class="lbl">${esc(s.lbl)}</div></div>`).join('');

  const labels = lang==='pt'
    ? {problem:'Desafio',action:'Ação',result:'Resultado'}
    : {problem:'Challenge',action:'Action',result:'Result'};

  const cards = t.impact.cards.map(c=>`
    <article class="card reveal">
      <span class="tag">${esc(c.tag)}</span>
      <h3>${esc(c.title)}</h3>
      <div class="row"><b>${labels.problem}</b><span>${esc(c.problem)}</span></div>
      <div class="row"><b>${labels.action}</b><span>${esc(c.action)}</span></div>
      <div class="row result"><b>${labels.result}</b><span>${esc(c.result)}</span></div>
    </article>`).join('');

  const jobs = t.exp.jobs.map(j=>`
    <div class="job reveal">
      <div class="meta">
        <h3>${esc(j.role)} · <span class="co">${esc(j.co)}</span></h3>
        <span class="when">${esc(j.when)}</span>
        ${j.loc?`<span class="loc">· ${esc(j.loc)}</span>`:''}
      </div>
      ${j.bullets.length?`<ul>${j.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>`:''}
    </div>`).join('');

  const chips = (arr,solid)=>arr.map(x=>`<span class="chip${solid?' solid':''}">${esc(x)}</span>`).join('');
  const edu = t.skills.edu.map(e=>`<div class="item"><div class="d">${esc(e.d)}</div><div class="s">${esc(e.s)}</div></div>`).join('');

  document.getElementById('main').innerHTML = `
    <section class="about" id="about">
      <div class="sec-head reveal"><span class="eyebrow"><i data-lucide="target"></i>${esc(t.about.eyebrow)}</span><h2>${esc(t.about.title)}</h2></div>
      <p class="reveal">${esc(t.about.body)}</p>
    </section>

    <section id="impact">
      <div class="sec-head reveal"><span class="eyebrow"><i data-lucide="trending-up"></i>${esc(t.impact.eyebrow)}</span><h2>${esc(t.impact.title)}</h2></div>
      <div class="cards">${cards}</div>
    </section>

    <section id="experience">
      <div class="sec-head reveal"><span class="eyebrow"><i data-lucide="briefcase"></i>${esc(t.exp.eyebrow)}</span><h2>${esc(t.exp.title)}</h2></div>
      <div class="tl">${jobs}</div>
    </section>

    <section id="skills">
      <div class="sec-head reveal"><span class="eyebrow"><i data-lucide="award"></i>${esc(t.skills.eyebrow)}</span><h2>${esc(t.skills.title)}</h2></div>
      <div class="twocol">
        <div class="block reveal"><h3>${esc(t.skills.compTitle)}</h3><div class="chips">${chips(t.skills.comp,true)}</div></div>
        <div class="block edu reveal"><h3>${esc(t.skills.certTitle)}</h3><div class="chips">${chips(t.skills.certs,false)}</div>${edu}</div>
      </div>
    </section>

    <section id="contact" style="border-top:0">
      <div class="contact-box reveal">
        <img class="contact-ava" src="assets/bruna.jpg" alt="Bruna Gomes" width="88" height="88" />
        <h2>${esc(t.contact.title)}</h2>
        <p>${esc(t.contact.body)}</p>
        <div class="cta">
          <a class="btn btn-primary" href="mailto:bruggomes79@gmail.com"><i data-lucide="mail"></i><span>${esc(t.contact.mail)}</span></a>
          <a class="btn btn-ghost" href="https://www.linkedin.com/in/bruna-gomes-product-manager" target="_blank" rel="noopener"><i data-lucide="linkedin"></i>LinkedIn</a>
        </div>
      </div>
    </section>`;

  observe();
  if(window.lucide) lucide.createIcons(); // ponytail: no-op até o script (defer) carregar; DOMContentLoaded refaz
}

function setLang(lang){
  document.documentElement.lang = lang==='pt' ? 'pt-BR' : 'en';
  document.getElementById('bt-pt').setAttribute('aria-pressed', lang==='pt');
  document.getElementById('bt-en').setAttribute('aria-pressed', lang==='en');
  try{ localStorage.setItem('lang', lang); }catch(e){}
  render(lang);
}

let io;
function observe(){
  const els = document.querySelectorAll('.reveal:not(.in)');
  if(!('IntersectionObserver' in window) || matchMedia('(prefers-reduced-motion:reduce)').matches){
    els.forEach(e=>e.classList.add('in')); return;
  }
  io = io || new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{rootMargin:'0px 0px -8% 0px'});
  els.forEach(e=>io.observe(e));
}

let saved = 'pt';
try{ saved = localStorage.getItem('lang') || 'pt'; }catch(e){}
setLang(saved);
// Lucide carrega via defer (depois deste script inline); inicializa os ícones quando pronto.
window.addEventListener('DOMContentLoaded', ()=>{ if(window.lucide) lucide.createIcons(); });
</script>
</body>
</html>
